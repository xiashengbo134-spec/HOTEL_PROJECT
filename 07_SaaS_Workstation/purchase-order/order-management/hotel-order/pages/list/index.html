<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>酒店订单列表页原型</title>
  <style>
    :root {
      --color-primary: #165dff;
      --color-primary-hover: #4080ff;
      --color-success: #00b42a;
      --color-warning: #ff7d00;
      --color-danger: #f53f3f;
      --color-text-1: #1d2129;
      --color-text-2: #4e5969;
      --color-text-3: #86909c;
      --color-text-4: #c9cdd4;
      --color-border-1: #e5e6eb;
      --color-border-2: #f2f3f5;
      --color-fill-1: #f7f8fa;
      --color-bg-1: #ffffff;
      --color-bg-2: #f2f3f5;
      --color-bg-blue: #edf3ff;
      --shadow-card: 0 8px 24px rgba(29, 33, 41, 0.06);
      --radius-small: 4px;
      --radius-large: 4px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--color-bg-2); font-family: "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--color-text-1); }
    button, input, select { font-family: inherit; }
    .layout { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { height: 56px; background: #fff; border-bottom: 1px solid var(--color-border-1); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 50; }
    .topbar-left { display: flex; align-items: center; gap: 18px; min-width: 0; }
    .topbar-title { font-size: 16px; font-weight: 600; white-space: nowrap; }
    .tenant-brand { display: inline-flex; align-items: center; gap: 10px; min-width: 0; }
    .tenant-name { color: var(--color-text-1); font-size: 16px; font-weight: 600; white-space: nowrap; }
    .top-nav { display: inline-flex; align-items: center; gap: 8px; padding-left: 18px; border-left: 1px solid var(--color-border-2); }
    .top-nav-item { display: inline-flex; align-items: center; justify-content: center; min-width: 96px; height: 32px; padding: 0 14px; border-radius: 8px; color: var(--color-text-2); font-size: 14px; font-weight: 500; background: transparent; }
    .top-nav-item.active { background: var(--color-bg-blue); color: var(--color-primary); font-weight: 600; }
    .avatar-chip { display: inline-flex; align-items: center; gap: 10px; padding: 6px 10px 6px 6px; border-radius: 999px; background: var(--color-fill-1); border: 1px solid var(--color-border-2); }
    .avatar-circle { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #165dff, #36cfc9); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
    .avatar-name { color: var(--color-text-2); font-size: 14px; font-weight: 500; }
    .main { min-height: calc(100vh - 56px); display: flex; }
    .sidebar { width: 232px; flex-shrink: 0; background: #fff; border-right: 1px solid var(--color-border-1); padding: 16px 12px; }
    .menu-group-title { padding: 8px 12px; color: var(--color-text-3); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .menu-tree, .menu-children { display: flex; flex-direction: column; gap: 4px; }
    .menu-children { padding-left: 12px; }
    .menu-item { display: flex; align-items: center; min-height: 40px; padding: 0 12px; border-radius: 10px; color: var(--color-text-2); font-size: 14px; font-weight: 500; }
    .menu-item.parent { justify-content: space-between; }
    .menu-item-main { display: inline-flex; align-items: center; gap: 8px; }
    .menu-item-icon { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; color: currentColor; }
    .menu-item-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .menu-item.active { background: var(--color-bg-blue); color: var(--color-primary); font-weight: 600; }
    .content { flex: 1; min-width: 0; padding: 10px; }
    .container { width: 100%; }
    .card { background: var(--color-bg-1); border: 1px solid var(--color-border-2); border-radius: var(--radius-large); box-shadow: var(--shadow-card); }
    .toolbar-card { padding: 16px; margin-bottom: 8px; }
    .toolbar-main { display: flex; align-items: stretch; gap: 8px; }
    .form-grid { flex: 1; display: grid; grid-template-columns: minmax(180px,1fr) minmax(180px,1fr) minmax(220px,1.15fr) minmax(220px,1.15fr); gap: 14px; align-items: end; }
    .field { min-width: 0; }
    .field-label { display: none; }
    .field-control, .range-control { width: 100%; min-height: 36px; border: 1px solid var(--color-border-1); border-radius: var(--radius-small); background: #fff; color: var(--color-text-1); padding: 0 12px; outline: none; }
    .field-control:focus, .range-control:focus, .date-select:focus, .inline-field:focus-within { border-color: var(--color-primary); box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.1); }
    .field-control::placeholder { color: var(--color-text-4); }
    .inline-field { display: flex; align-items: center; min-height: 36px; border: 1px solid var(--color-border-1); border-radius: var(--radius-small); background: #fff; padding: 0 10px; gap: 10px; }
    .field-prefix { flex: 0 0 auto; color: var(--color-text-1); font-size: 14px; white-space: nowrap; }
    .field-split { width: 1px; height: 16px; background: var(--color-border-1); flex-shrink: 0; }
    .inline-field .field-control,
    .inline-field .date-select { border: 0; min-height: 34px; padding: 0; background: transparent; box-shadow: none; }
    .inline-field .field-control:focus,
    .inline-field .date-select:focus { box-shadow: none; }
    .inline-field .field-control { flex: 1; min-width: 0; }
    .composite-control { display: flex; align-items: center; gap: 4px; min-width: 0; width: 100%; }
    .date-select { min-width: 98px; color: var(--color-text-2); outline: none; }
    .field-time .date-select { flex: 0 0 88px; min-width: 88px; font-size: 14px; }
    .field-time .field-split { margin: 0 1px; }
    .range-control { display: flex; align-items: center; gap: 8px; padding: 0; border: 0; min-height: auto; background: transparent; }
    .field-time .range-control { flex: 1; min-width: 0; cursor: pointer; }
    .range-control input { border: 0; outline: none; min-width: 0; width: 100%; flex: 1; color: var(--color-text-1); background: transparent; padding: 0; cursor: pointer; }
    .field-time .range-control input { flex: 1 1 96px; }
    .range-sep { color: var(--color-text-4); font-size: 12px; }
    .toolbar-actions { margin-top: 0; display: flex; flex: 0 0 100px; padding-left: 16px; border-left: 1px solid var(--color-border-1); }
    .field-time { margin-right: 0; }
    .field-city { width: 100%; max-width: none; margin-left: 0; justify-self: stretch; }
    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .filter-btn-group { width: 100%; flex-direction: column; align-items: stretch; justify-content: space-between; flex-wrap: nowrap; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; min-width: 88px; height: 36px; padding: 0 16px; border-radius: var(--radius-small); border: 1px solid var(--color-border-1); background: #fff; color: var(--color-text-2); font-size: 14px; cursor: pointer; }
    .btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .btn-primary { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); color: #fff; }
    .btn-outline-primary { color: var(--color-primary); border-color: rgba(22, 93, 255, 0.35); background: rgba(22, 93, 255, 0.04); }
    .btn-outline-danger { color: var(--color-danger); border-color: rgba(245, 63, 63, 0.35); background: rgba(245, 63, 63, 0.04); }
    .btn[disabled] { opacity: .5; cursor: not-allowed; }
    .tabs-card { margin-bottom: 8px; padding: 0 16px; }
    .tabs-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .tabs { display: flex; gap: 28px; overflow-x: auto; min-width: 0; flex: 1; }
    .tab { position: relative; display: inline-flex; align-items: center; gap: 8px; height: 56px; padding: 0; border: 0; background: transparent; color: var(--color-text-2); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .tab::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 3px; border-radius: 999px 999px 0 0; background: transparent; }
    .tab.active { color: var(--color-primary); font-weight: 600; }
    .tab.active::after { background: var(--color-primary); }
    .badge-dot { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 999px; background: var(--color-danger); color: #fff; font-size: 12px; font-weight: 600; }
    .list-card { padding: 12px; }
    .list-meta { display: flex; align-items: center; justify-content: space-between; padding: 0 16px 8px; color: var(--color-text-2); font-size: 14px; gap: 12px; }
    .list-count { font-weight: 500; }
    .list-sort { display: inline-flex; align-items: center; justify-content: flex-start; }
    .list-sort-select { width: 120px; min-width: 120px; height: 30px; padding: 0 20px 0 10px; border: 1px solid var(--color-border-1); border-radius: var(--radius-small); background: var(--color-fill-1); color: var(--color-text-2); font-size: 12px; text-align: center; text-align-last: center; outline: none; }
    .list-sort-select:focus { border-color: var(--color-primary); box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.1); }
    .summary-chip { display: inline-flex; align-items: center; gap: 6px; min-height: 24px; padding: 0 10px; border-radius: 4px; background: var(--color-fill-1); color: var(--color-text-2); font-size: 14px; line-height: 20px; }
    .order-item { border: 1px solid var(--color-border-1); border-radius: 6px; background: #fff; padding: 10px 16px; }
    .order-item + .order-item { margin-top: 6px; }
    .order-top { display: grid; grid-template-columns: minmax(420px,1.38fr) minmax(460px,1.82fr) minmax(210px,.82fr) minmax(220px,.86fr); gap: 12px; align-items: start; }
    .section-title { margin-bottom: 6px; color: var(--color-text-3); font-size: 12px; font-weight: 500; }
    .order-title-line { display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
    .source-line { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; width: max-content; }
    .channel-badge { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 10px; color: #fff; font-weight: 700; font-size: 12px; flex-shrink: 0; }
    .channel-feizhu { background: linear-gradient(135deg, #ff7d00, #ffb400); }
    .channel-douyin { background: linear-gradient(135deg, #111827, #4b5563); }
    .channel-meituan { background: linear-gradient(135deg, #ffb400, #ff7d00); }
    .channel-xiecheng { background: linear-gradient(135deg, #165dff, #36cfc9); }
    .order-main { min-width: 0; }
    .id-row { display: flex; flex-direction: column; gap: 4px; min-width: 0; margin-bottom: 6px; }
    .id-cell { display: flex; align-items: center; gap: 8px; min-width: 0; flex-wrap: nowrap; }
    .mono { font-family: "JetBrains Mono", Consolas, monospace; white-space: nowrap; font-size: 14px; }
    .copy-btn { border: 0; background: transparent; color: var(--color-text-3); cursor: pointer; padding: 0; }
    .copy-icon { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--color-border-1); border-radius: 4px; font-size: 10px; background: #fff; }
    .copy-btn:hover .copy-icon { border-color: rgba(22, 93, 255, 0.35); background: rgba(22, 93, 255, 0.06); }
    .hotel-line { display: flex; align-items: center; gap: 8px; min-width: 0; margin-bottom: 4px; flex-wrap: wrap; }
    .hotel-name { font-size: 15px; font-weight: 600; color: var(--color-text-1); display: inline-flex; align-items: center; gap: 6px; min-width: 0; }
    .id-info-icon { display: inline-flex; align-items: center; justify-content: center; min-width: 24px; height: 18px; padding: 0 4px; border-radius: 4px; border: 1px solid var(--color-border-1); color: var(--color-text-3); font-size: 10px; font-weight: 600; background: #fff; flex-shrink: 0; line-height: 1; }
    .text-ellipsis { display: inline-block; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom; }
    .sub-line { display: flex; align-items: center; gap: 8px; color: var(--color-text-2); font-size: 14px; line-height: 1.35; margin: 4px 0; }
    .sub-line strong { color: var(--color-text-3); font-size: 12px; line-height: 20px; font-weight: 500; }
    .sub-line-value { color: var(--color-text-1); font-weight: 500; }
    .pair-line { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); column-gap: 40px; row-gap: 6px; align-items: start; }
    .pair-item { display: flex; align-items: flex-start; min-width: 0; }
    .pair-item strong { width: auto; flex: initial; }
    .order-inline-icon { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; color: #86909c; flex: 0 0 22px; vertical-align: middle; }
    .order-inline-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .inline-icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 18px; padding: 0 4px; border-radius: 4px; border: 1px solid var(--color-border-1); color: var(--color-text-3); background: #fff; cursor: help; flex-shrink: 0; line-height: 1; position: relative; }
    .inline-icon-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .inline-separator { color: var(--color-text-4); margin: 0 8px; }
    .time-list, .action-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .time-stack, .status-stack, .amount-stack { display: flex; flex-direction: column; gap: 6px; }
    .time-item { display: flex; align-items: center; justify-content: flex-start; gap: 10px; min-height: 22px; }
    .metric, .status-item { display: grid; grid-template-columns: 72px minmax(0, 1fr); align-items: start; column-gap: 10px; row-gap: 6px; min-height: 24px; }
    .sale-mode-row { display: flex; align-items: center; justify-content: flex-start; gap: 10px; min-height: 24px; }
    .time-label, .status-name, .metric-label, .sale-mode-label { width: 72px; flex: 0 0 72px; color: var(--color-text-3); font-size: 12px; line-height: 24px; }
    .time-value { color: var(--color-text-1); font-size: 14px; line-height: 1.35; text-align: left; word-break: break-all; }

    .tag { display: inline-flex; align-items: center; justify-content: center; min-height: 24px; padding: 0 10px; border-radius: 4px; border: 0; font-size: 14px; line-height: 20px; white-space: nowrap; box-shadow: none; }
    .tag-blue { background: rgba(22, 93, 255, 0.08); color: var(--color-primary); }
    .tag-green { background: rgba(0, 180, 42, 0.08); color: var(--color-success); }
    .tag-orange { background: rgba(255, 125, 0, 0.1); color: var(--color-warning); }
    .tag-red { background: rgba(245, 63, 63, 0.08); color: var(--color-danger); }
    .tag-purple { background: rgba(114, 46, 209, 0.08); color: #722ed1; }
    .tag-gray { background: var(--color-fill-1); color: var(--color-text-2); }
    .tag-purchase-success { background: rgba(0, 180, 42, 0.16); color: #087c2e; }
    .tag-purchase-processing { background: rgba(255, 125, 0, 0.18); color: #b75d00; }
    .tag-purchase-failed { background: rgba(245, 63, 63, 0.16); color: #b71d1d; }
    .tag-purchase-stopped { background: rgba(134, 144, 156, 0.18); color: #4e5969; }
    .tag-purchase-none { background: rgba(229, 230, 235, 0.9); color: #86909c; }
    .status-tags { display: inline-flex; flex-direction: column; align-items: flex-start; justify-content: flex-start; gap: 6px; min-width: 0; max-width: 100%; min-height: 24px; }
    .status-tags-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; width: 100%; max-width: 100%; }
    .status-tags-row .tag, .status-tags > .tag { width: auto; max-width: 100%; flex: 0 0 auto; }
        .metric { padding: 0; border-radius: 0; background: transparent; }
    .metric-value { font-size: 16px; font-weight: 700; color: var(--color-text-1); display: inline-flex; align-items: center; gap: 8px; line-height: 24px; text-align: left; }
    .metric-danger .metric-value { color: var(--color-danger); }
    .metric-warning .metric-value { color: var(--color-warning); }
    .sale-mode-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 42px; width: auto; max-width: max-content; min-height: 24px; padding: 0 10px; border-radius: 4px; font-size: 14px; font-weight: 500; background: rgba(22, 93, 255, 0.08); color: var(--color-primary); flex: 0 0 auto; }
    .timer-label { display: none; }
    .timer-value { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0; line-height: 1.1; color: var(--color-text-1); }

        .timer-safe .timer-value { color: #00a870; }
        .timer-warning .timer-value { color: var(--color-warning); }
        .timer-danger .timer-value, .timer-timeout .timer-value { color: var(--color-danger); }
        .timer-result { color: var(--color-text-1); font-weight: 600; font-size: 18px; line-height: 1.35; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        .timer-result-text { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; font-weight: 600; line-height: 1.2; letter-spacing: 0; color: var(--color-text-1); }


    .order-bottom { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--color-border-1); display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; }
    .pagination { margin-top: 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 4px; color: var(--color-text-2); font-size: 14px; }
    .pagination-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .page-number { min-width: 32px; height: 32px; padding: 0 10px; }
    .page-number.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .empty-state { padding: 60px 20px; text-align: center; color: var(--color-text-3); }
    .empty-title { margin: 0 0 8px; font-size: 18px; color: var(--color-text-2); font-weight: 600; }
    .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-12px); min-width: 220px; max-width: 520px; padding: 12px 16px; border-radius: 10px; background: rgba(29, 33, 41, 0.92); color: #fff; font-size: 14px; opacity: 0; pointer-events: none; transition: all 0.2s ease; z-index: 1000; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .modal-mask { position: fixed; inset: 0; background: rgba(29, 33, 41, 0.45); display: none; align-items: center; justify-content: center; padding: 24px; z-index: 999; }
    .modal-mask.show { display: flex; }
    .modal { width: 100%; max-width: 420px; border-radius: 16px; background: #fff; box-shadow: 0 20px 48px rgba(29, 33, 41, 0.18); overflow: hidden; }
    .modal-head { padding: 18px 20px 8px; font-size: 18px; font-weight: 600; }
    .modal-body { padding: 8px 20px 20px; color: var(--color-text-2); line-height: 1.7; font-size: 14px; }
    .modal-foot { padding: 0 20px 20px; display: flex; justify-content: flex-end; gap: 12px; }
    .drawer-mask { position: fixed; inset: 0; background: rgba(29, 33, 41, 0.35); display: none; justify-content: flex-end; z-index: 998; }
    .drawer-mask.show { display: flex; }
    .drawer-panel { width: 1400px; max-width: calc(100vw - 32px); height: 100vh; background: #fff; box-shadow: -12px 0 32px rgba(29, 33, 41, 0.18); display: flex; flex-direction: column; }
    .drawer-head { height: 56px; padding: 0 20px; border-bottom: 1px solid var(--color-border-1); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .drawer-title { font-size: 16px; font-weight: 600; }
    .drawer-close-icon { width: 32px; min-width: 32px; height: 32px; padding: 0; font-size: 18px; line-height: 1; }
    .drawer-body { flex: 1; min-height: 0; background: var(--color-bg-2); }
    .drawer-iframe { width: 100%; height: 100%; border: 0; background: #fff; }
    .global-overlay-mask { position: fixed; inset: 0; background: rgba(29, 33, 41, 0.48); display: none; justify-content: flex-end; z-index: 1200; }
    .global-overlay-mask.show { display: flex; }
    .global-overlay-mask.level-3 { z-index: 1300; background: rgba(15, 23, 42, 0.56); }
    .global-overlay-panel { width: 1400px; max-width: 100vw; height: 100vh; background: #fff; box-shadow: -12px 0 32px rgba(29, 33, 41, 0.22); display: flex; flex-direction: column; }
    .global-overlay-panel.is-log { width: 1200px; }
    .global-overlay-panel.is-detail { width: 1400px; }
    .global-overlay-panel.is-json { width: 960px; }
    .global-overlay-head { height: 56px; padding: 0 20px; border-bottom: 1px solid var(--color-border-1); display: flex; align-items: center; justify-content: space-between; gap: 12px; background: #fff; }
    .global-overlay-title { font-size: 16px; font-weight: 600; }
    .global-overlay-body { flex: 1; min-height: 0; background: var(--color-bg-2); }
    .global-overlay-iframe { width: 100%; height: 100%; border: 0; background: #fff; }
    [data-tooltip], [data-rich-tooltip] { position: relative; cursor: help; }
    .hover-tooltip-layer { position: absolute; left: 0; top: 0; display: none; width: max-content; max-width: min(420px, calc(100vw - 32px)); padding: 10px 12px; border-radius: 8px; background: #000; color: #fff; white-space: pre-wrap; font-size: 14px; line-height: 1.6; z-index: 3000; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.35); pointer-events: auto; }

    const left = Math.max(window.scrollX + 16, Math.min(window.scrollX + rect.left, maxLeft));
    const top = window.scrollY + rect.bottom + gap;
    hoverTooltipEl.style.left = `${left}px`;
    hoverTooltipEl.style.top = `${top}px`;
  }
  function openHoverTooltip(target) {
    const text = target.getAttribute('data-rich-tooltip') || target.getAttribute('data-tooltip');
    if (!text) return;
    clearTimeout(hideTooltipTimer);
    activeTooltipTarget = target;
    hoverTooltipEl.textContent = text;
    hoverTooltipEl.classList.add('show');
    placeHoverTooltip(target);
  }

    const cancelConfirmBtn = document.getElementById('cancelConfirmBtn');

    function formatCountdown(deadline) { const diff = Math.max(0, deadline - Date.now()); const totalSeconds = Math.floor(diff / 1000); const minutes = Math.floor(totalSeconds / 60); const seconds = totalSeconds % 60; return `${String(minutes).padStart(2, '0')}分${String(seconds).padStart(2, '0')}秒`; }
    function getSlaLevel(deadline) { const diff = Math.max(0, deadline - Date.now()); const minutes = diff / 1000 / 60; if (diff <= 0) return 'timeout'; if (minutes < 5) return 'danger'; if (minutes < 15) return 'warning'; return 'safe'; }
    function escapeHtml(text) { return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    function buildHotelMetaTooltip(order) { return `城市：${order.city}\n地址：${order.hotelAddress}`; }
    function renderLineIcon(type) {
      const icons = {
        room: '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2.5 10.5v-4a1 1 0 0 1 1-1h8a2 2 0 0 1 2 2v3"></path><path d="M2.5 10.5h11"></path><path d="M2.5 12.5v-2"></path><path d="M13.5 12.5v-2"></path><path d="M4.5 8.5h2"></path></svg>',
        date: '<svg viewBox="0 0 16 16" aria-hidden="true"><rect x="2.5" y="3.5" width="11" height="10" rx="2"></rect><path d="M5 2.5v2"></path><path d="M11 2.5v2"></path><path d="M2.5 6.5h11"></path></svg>',
        guest: '<svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="5.5" r="2.5"></circle><path d="M3 13c.8-2 2.6-3 5-3s4.2 1 5 3"></path></svg>',
        time: '<svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="5.5"></circle><path d="M8 5.2v3.2l2.2 1.3"></path></svg>',
        location: '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 13s4-3.3 4-6.4A4 4 0 1 0 4 6.6C4 9.7 8 13 8 13Z"></path><circle cx="8" cy="6.5" r="1.4"></circle></svg>'
      };
      return `<span class="order-inline-icon">${icons[type] || ''}</span>`;
    }

    function getFilteredOrders() {
      return orders.filter(order => {
        const tabMatch = state.activeTab === 'all' ? true : order.bizStatus === state.activeTab;
        if (!tabMatch) return false;
        const { orderNo, outerOrderNo, guestKeyword, hotelKeyword, timeType, startDate, endDate, city, source, platformStatus } = state.filters;
        const guestText = `${order.guestName} ${order.contactName} ${order.contactMobile}`;
        const hotelText = `${order.hotelName} ${order.hotelAddress} ${order.hotelIdTooltip}`;
        const timeField = order[timeType] || '';
        const timeDate = timeField ? timeField.slice(0, 10) : '';
        if (orderNo && !order.orderNo.toLowerCase().includes(orderNo.toLowerCase())) return false;
        if (outerOrderNo && !order.outerOrderNo.toLowerCase().includes(outerOrderNo.toLowerCase())) return false;
        if (guestKeyword && !guestText.toLowerCase().includes(guestKeyword.toLowerCase())) return false;
        if (hotelKeyword && !hotelText.toLowerCase().includes(hotelKeyword.toLowerCase())) return false;
        if (city && !order.city.includes(city)) return false;
        if (source && order.source !== source) return false;
        if (platformStatus && order.platformStatus.text.indexOf(platformStatus) === -1) return false;
        if (startDate && timeDate < startDate) return false;
        if (endDate && timeDate > endDate) return false;
        return true;
      });
    }

    function renderTabs() {
      tabsEl.innerHTML = tabs.map(tab => `<button class="tab ${tab.key === state.activeTab ? 'active' : ''}" data-tab="${tab.key}">${tab.label}${tab.badge ? `<span class="badge-dot">${tab.badge}</span>` : ''}</button>`).join('');
    }

    function renderOrders() {
      const filtered = getFilteredOrders();
      const sorted = [...filtered];
      if (state.activeTab === 'pending' && state.sortBy === 'slaAsc') {
        sorted.sort((a, b) => {
          const aDeadline = a.sla && a.sla.enabled ? a.sla.deadline : Number.MAX_SAFE_INTEGER;
          const bDeadline = b.sla && b.sla.enabled ? b.sla.deadline : Number.MAX_SAFE_INTEGER;
          return aDeadline - bDeadline;
        });
      }
      const total = sorted.length;
      const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
      if (state.pageNum > totalPages) state.pageNum = totalPages;
      const start = (state.pageNum - 1) * state.pageSize;
      const paged = sorted.slice(start, start + state.pageSize);
      resultTextEl.textContent = `共 ${total} 条订单`;
      sortWrapEl.style.display = state.activeTab === 'pending' ? 'inline-flex' : 'none';
      sortSelectEl.value = state.sortBy;
      if (!paged.length) {
        orderListEl.innerHTML = `<div class="empty-state"><p class="empty-title">暂无匹配订单</p><div>你可以尝试切换 Tab 或调整筛选条件后重新查询。</div></div>`;
        paginationEl.innerHTML = '';
        return;
      }

      orderListEl.innerHTML = paged.map(order => {
        const afterSaleTags = order.afterSaleTags.length ? `<div class="status-tags-row">${order.afterSaleTags.map(tag => `<span class="tag tag-gray">${tag}</span>`).join('')}</div>` : '';
        const showAcceptReject = order.bizStatus === 'pending' || (state.activeTab === 'all' && order.bizStatus === 'pending');
        const amountTooltip = escapeHtml(order.amountTooltip);
        const timerHtml = order.sla.enabled
          ? `<div class="time-stack timer-${getSlaLevel(order.sla.deadline)}" data-tooltip="订单剩余处理时间"><div class="time-item"><span class="timer-value" data-deadline="${order.sla.deadline}">${formatCountdown(order.sla.deadline)}</span></div>${order.actionSummary.title ? `<div class="time-item"><span class="timer-result-text">${order.actionSummary.title}</span></div>` : ''}</div>`
          : `<div class="time-stack" data-tooltip="订单剩余处理时间"><div class="time-item"><span class="timer-result-text">${order.actionSummary.detail}</span></div></div>`;
        const hotelMetaTooltip = escapeHtml(buildHotelMetaTooltip(order));
        const roomInfoText = `${order.roomName}-${order.breakfast}`;
        const stayInfoText = order.isHourlyRoom ? `${order.roomCount}间` : `${order.roomCount}间${order.nightCount}晚`;
        const contactInfoText = `${order.contactName}<span class="inline-separator">|</span>${order.guestName}-${order.contactMobile}`;
        const dateInfoText = `${order.checkInDate}${order.checkOutDate !== '-' ? ` 至 ${order.checkOutDate}` : ''}`;

        return `<div class="order-item"><div class="order-top"><div><div class="section-title">订单号</div><div class="id-row"><div class="id-cell"><span class="tag tag-blue">外部</span><span class="mono">${order.outerOrderNo}</span><button class="copy-btn" data-copy="${order.outerOrderNo}" aria-label="复制外部单号"><span class="copy-icon">⧉</span></button></div><div class="id-cell"><span class="tag tag-gray">系统</span><span class="mono">${order.orderNo}</span><button class="copy-btn" data-copy="${order.orderNo}" aria-label="复制系统单号"><span class="copy-icon">⧉</span></button></div></div><div class="source-line" data-tooltip="订单来源"><div class="channel-badge ${order.channelClass}">${order.channelText}</div><span class="tag tag-gray">${order.source}</span></div><div style="margin-top: 8px;">${timerHtml}</div></div><div><div class="section-title">酒店信息</div><div class="order-title-line"><div class="order-main"><div class="hotel-line"><span class="hotel-name"><span class="text-ellipsis" data-tooltip="${escapeHtml(order.hotelName)}">${order.hotelName}</span><span class="id-info-icon" data-tooltip="${escapeHtml(order.hotelIdTooltip)}">ID</span></span><span class="inline-icon-btn" data-rich-tooltip="${hotelMetaTooltip}">${renderLineIcon('location').replace('order-inline-icon', '')}</span>${order.isHourlyRoom ? '<span class="tag tag-purple">钟点房</span>' : ''}<span class="tag tag-gray" data-tooltip="${escapeHtml(order.cancelRule)}">取消规则</span></div><div class="sub-line">${renderLineIcon('room').replace('order-inline-icon', 'order-inline-icon" data-tooltip="房型')}<span class="sub-line-value text-ellipsis" style="max-width:320px;" data-tooltip="${escapeHtml(roomInfoText)}">${roomInfoText}</span></div>${order.isHourlyRoom ? `<div class="sub-line">${renderLineIcon('time').replace('order-inline-icon', 'order-inline-icon" data-tooltip="钟点房信息')}<span class="sub-line-value">${order.stayDuration}<span class="inline-separator">|</span>${order.selectedTimeRange}</span></div>` : ''}<div class="sub-line">${renderLineIcon('date').replace('order-inline-icon', 'order-inline-icon" data-tooltip="入离时间')}<span class="sub-line-value">${dateInfoText}<span class="inline-separator">|</span>${stayInfoText}</span></div><div class="sub-line">${renderLineIcon('guest').replace('order-inline-icon', 'order-inline-icon" data-tooltip="入住人信息')}<span class="sub-line-value text-ellipsis" style="max-width:360px;">${contactInfoText}</span></div></div></div></div><div><div class="section-title">金额信息</div><div class="amount-stack"><div class="metric metric-danger" data-tooltip="${amountTooltip}"><div class="metric-label">支付金额</div><div class="metric-value">${order.payAmount}</div></div><div class="metric metric-warning" data-tooltip="${amountTooltip}"><div class="metric-label">结算金额</div><div class="metric-value">${order.settlementAmount}</div></div><div class="sale-mode-row"><span class="sale-mode-label">售卖模式</span><span class="sale-mode-badge">${order.saleMode}</span></div></div></div><div><div class="section-title">状态信息</div><div class="status-stack"><div class="status-item"><span class="status-name">${order.systemStatus.label}</span><div class="status-tags"><span class="tag ${order.systemStatus.type}">${order.systemStatus.text}</span></div></div><div class="status-item"><span class="status-name">${order.platformStatus.label}</span><div class="status-tags"><span class="tag tag-gray">${order.platformStatus.text}</span></div></div><div class="status-item"><span class="status-name">${order.purchaseTaskStatus.label}</span><div class="status-tags"><span class="tag ${order.purchaseTaskStatus.type}">${order.purchaseTaskStatus.text}</span></div></div><div class="status-item"><span class="status-name">${order.afterSaleStatus.label}</span><div class="status-tags"><span class="tag ${order.afterSaleStatus.type}">${order.afterSaleStatus.text}</span>${afterSaleTags}</div></div></div></div></div><div class="order-bottom"><div class="time-list"><span class="summary-chip">预订时间：${order.bookingTime}</span><span class="summary-chip">支付时间：${order.payTime}</span><span class="summary-chip">取消时间：${order.cancelTime}</span></div><div class="action-list">${showAcceptReject ? `<button class="btn btn-outline-primary" data-action="accept" data-order="${order.orderNo}">接单</button><button class="btn btn-outline-danger" data-action="reject" data-order="${order.orderNo}">拒单</button>` : ''}<button class="btn" data-action="detail" data-order="${order.orderNo}">订单详情</button><button class="btn" data-action="log" data-order="${order.orderNo}">日志</button></div></div></div>`;

      }).join('');

      paginationEl.innerHTML = `<div>第 ${state.pageNum} / ${totalPages} 页</div><div class="pagination-controls"><button class="btn page-number" data-page-action="prev" ${state.pageNum === 1 ? 'disabled' : ''}>上一页</button>${Array.from({ length: totalPages }, (_, i) => i + 1).map(page => `<button class="btn page-number ${page === state.pageNum ? 'active' : ''}" data-page="${page}">${page}</button>`).join('')}<button class="btn page-number" data-page-action="next" ${state.pageNum === totalPages ? 'disabled' : ''}>下一页</button></div>`;
      updateCountdowns();
    }

    function render() { renderTabs(); renderOrders(); }
    function syncFiltersFromDom() { state.filters.orderNo = document.getElementById('filterOrderNo').value.trim(); state.filters.outerOrderNo = document.getElementById('filterOuterOrderNo').value.trim(); state.filters.guestKeyword = document.getElementById('filterGuestKeyword').value.trim(); state.filters.hotelKeyword = document.getElementById('filterHotelKeyword').value.trim(); state.filters.timeType = document.getElementById('filterTimeType').value; state.filters.startDate = document.getElementById('filterStartDate').value; state.filters.endDate = document.getElementById('filterEndDate').value; state.filters.city = document.getElementById('filterCity').value; state.filters.source = document.getElementById('filterSource').value; state.filters.platformStatus = document.getElementById('filterPlatformStatus').value; state.pageNum = 1; }
    function resetFilters() { document.getElementById('filterOrderNo').value = ''; document.getElementById('filterOuterOrderNo').value = ''; document.getElementById('filterGuestKeyword').value = ''; document.getElementById('filterHotelKeyword').value = ''; document.getElementById('filterTimeType').value = 'bookingTime'; document.getElementById('filterStartDate').value = ''; document.getElementById('filterEndDate').value = ''; document.getElementById('filterCity').value = ''; document.getElementById('filterSource').value = ''; document.getElementById('filterPlatformStatus').value = ''; syncFiltersFromDom(); render(); showToast('筛选条件已重置'); }
    function showToast(message) { toastEl.textContent = message; toastEl.classList.add('show'); clearTimeout(showToast.timer); showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 1800); }
    function openConfirm(action, orderNo) { const actionText = action === 'accept' ? '接单' : '拒单'; state.confirmAction = { action, orderNo }; confirmTitle.textContent = `确认${actionText}`; confirmContent.textContent = `确认要对订单 ${orderNo} 执行“${actionText}”操作吗？`; confirmMask.classList.add('show'); }
    function closeConfirm() { confirmMask.classList.remove('show'); state.confirmAction = null; }
        function updateBodyScrollLock() { document.body.style.overflow = detailDrawer.classList.contains('show') || logDrawer.classList.contains('show') || globalOverlayDrawer.classList.contains('show') || globalOverlayDrawerLevel3.classList.contains('show') ? 'hidden' : ''; }
  function openDetailDrawer(orderNo) { detailDrawerFrame.src = buildChildPageUrl('../detail/side-drawer.html', orderNo, { viewMode: 'drawer' }); detailDrawer.classList.add('show'); updateBodyScrollLock(); }
  function closeDetailDrawer() { detailDrawer.classList.remove('show'); updateBodyScrollLock(); }
  function openLogDrawer(orderNo) { logDrawerFrame.src = buildChildPageUrl('../log/index.html', orderNo, { viewMode: 'drawer' }); logDrawer.classList.add('show'); updateBodyScrollLock(); }
  function closeLogDrawer() { logDrawer.classList.remove('show'); updateBodyScrollLock(); }
    function setOverlayPanelState(panel, titleEl, frameEl, targetType, orderNo, extraPayload = {}, level = '2') {
    panel.classList.remove('is-detail', 'is-log', 'is-json');
    panel.classList.add(targetType === 'detail' ? 'is-detail' : targetType === 'json' ? 'is-json' : 'is-log');
    titleEl.textContent = targetType === 'detail' ? '订单详情' : targetType === 'json' ? '日志报文详情' : '订单日志';
    frameEl.src = targetType === 'detail'
      ? buildChildPageUrl('../detail/side-drawer.html', orderNo || '', { viewMode: 'overlay', overlayLevel: level })
      : targetType === 'json'
        ? buildChildPageUrl('../log/json-viewer.html', '', { storageKey: extraPayload.storageKey || '', viewMode: 'overlay', overlayLevel: level })
        : buildChildPageUrl('../log/index.html', orderNo || '', { viewMode: 'overlay', overlayLevel: level });
  }
  function openGlobalOverlay(type, orderNo, extraPayload = {}) {
    const targetType = type === 'detail' || type === 'json' ? type : 'log';
    const useLevel3 = globalOverlayDrawer.classList.contains('show') && targetType === 'json';
    if (useLevel3) {
      setOverlayPanelState(globalOverlayPanelLevel3, globalOverlayTitleLevel3, globalOverlayFrameLevel3, targetType, orderNo, extraPayload, '3');
      globalOverlayDrawerLevel3.classList.add('show');
      updateBodyScrollLock();
      return;
    }
    setOverlayPanelState(globalOverlayPanel, globalOverlayTitle, globalOverlayFrame, targetType, orderNo, extraPayload, '2');
    globalOverlayDrawer.classList.add('show');
    updateBodyScrollLock();
  }

  function closeGlobalOverlay() {
    if (globalOverlayDrawerLevel3.classList.contains('show')) {
      globalOverlayDrawerLevel3.classList.remove('show');
      globalOverlayFrameLevel3.src = 'about:blank';
      updateBodyScrollLock();
      return;
    }
    globalOverlayDrawer.classList.remove('show');
    globalOverlayFrame.src = 'about:blank';
    updateBodyScrollLock();
  }
  window.HotelOrderLayer = {
    openOverlay(payload = {}) {
      const config = typeof payload === 'string' ? { type: payload } : payload;
      openGlobalOverlay(config.type, config.orderNo, config);
    },
    closeOverlay: closeGlobalOverlay
  };
  window.addEventListener('message', event => {
    const data = event.data || {};
    if (data.type === 'HOTEL_ORDER_OPEN_OVERLAY') {
      openGlobalOverlay(data.payload?.type, data.payload?.orderNo, data.payload || {});
    }
    if (data.type === 'HOTEL_ORDER_CLOSE_OVERLAY') {
      closeGlobalOverlay();
    }
  });


    function updateCountdowns() { document.querySelectorAll('.timer-value[data-deadline]').forEach(el => { const deadline = Number(el.dataset.deadline); const box = el.closest('.time-stack'); const level = getSlaLevel(deadline); el.textContent = formatCountdown(deadline); if (box) { box.classList.remove('timer-safe', 'timer-warning', 'timer-danger', 'timer-timeout'); box.classList.add(`timer-${level}`); } }); }
    document.addEventListener('mouseover', event => {
      const target = event.target.closest('[data-tooltip], [data-rich-tooltip]');
      if (!target) return;
      if (target === activeTooltipTarget) {
        clearTimeout(hideTooltipTimer);
        return;
      }
      openHoverTooltip(target);
    });
    document.addEventListener('mouseout', event => {
      const target = event.target.closest('[data-tooltip], [data-rich-tooltip]');
      if (!target || target !== activeTooltipTarget) return;
      const related = event.relatedTarget;
      if (related && (target.contains(related) || hoverTooltipEl.contains(related))) return;
      scheduleCloseHoverTooltip();
    });
    hoverTooltipEl.addEventListener('mouseenter', () => clearTimeout(hideTooltipTimer));
    hoverTooltipEl.addEventListener('mouseleave', scheduleCloseHoverTooltip);
    window.addEventListener('scroll', () => {
      if (activeTooltipTarget && hoverTooltipEl.classList.contains('show')) placeHoverTooltip(activeTooltipTarget);
    }, true);
    window.addEventListener('resize', () => {
      if (activeTooltipTarget && hoverTooltipEl.classList.contains('show')) placeHoverTooltip(activeTooltipTarget);
    });


    tabsEl.addEventListener('click', event => { const tabBtn = event.target.closest('[data-tab]'); if (!tabBtn) return; state.activeTab = tabBtn.dataset.tab; state.pageNum = 1; if (state.activeTab !== 'pending') state.sortBy = 'default'; render(); });
        orderListEl.addEventListener('click', async event => { const copyBtn = event.target.closest('[data-copy]'); if (copyBtn) { try { await navigator.clipboard.writeText(copyBtn.dataset.copy); showToast(`已复制：${copyBtn.dataset.copy}`); } catch { showToast('复制失败，请手动复制'); } return; } const actionBtn = event.target.closest('[data-action]'); if (!actionBtn) return; const action = actionBtn.dataset.action; const orderNo = actionBtn.dataset.order; if (action === 'accept' || action === 'reject') return openConfirm(action, orderNo); if (action === 'detail') return openDetailDrawer(orderNo); if (action === 'log') return openLogDrawer(orderNo); });

    paginationEl.addEventListener('click', event => { const pageBtn = event.target.closest('[data-page]'); const actionBtn = event.target.closest('[data-page-action]'); const totalPages = Math.max(1, Math.ceil(getFilteredOrders().length / state.pageSize)); if (pageBtn) { state.pageNum = Number(pageBtn.dataset.page); render(); return; } if (actionBtn) { const action = actionBtn.dataset.pageAction; if (action === 'prev' && state.pageNum > 1) state.pageNum -= 1; if (action === 'next' && state.pageNum < totalPages) state.pageNum += 1; render(); } });
    sortSelectEl.addEventListener('change', event => { state.sortBy = event.target.value; state.pageNum = 1; render(); });
    filterTimeFieldEl?.addEventListener('click', event => {
      const target = event.target;
      if (target.closest('#filterTimeType')) return;
      if (target.closest('#filterEndDate')) {
        filterEndDateEl?.showPicker?.();
        return;
      }
      filterStartDateEl?.showPicker?.();
    });
    document.getElementById('searchBtn').addEventListener('click', () => { syncFiltersFromDom(); render(); showToast('已按当前筛选条件刷新列表'); });
    document.getElementById('resetBtn').addEventListener('click', resetFilters);
    submitConfirmBtn.addEventListener('click', () => { if (!state.confirmAction) return; showToast(`已确认${state.confirmAction.action === 'accept' ? '接单' : '拒单'}：${state.confirmAction.orderNo}`); closeConfirm(); });
    cancelConfirmBtn.addEventListener('click', closeConfirm);
    confirmMask.addEventListener('click', event => { if (event.target === confirmMask) closeConfirm(); });
        document.getElementById('closeDetailDrawerBtn').addEventListener('click', closeDetailDrawer);
    document.getElementById('closeLogDrawerBtn').addEventListener('click', closeLogDrawer);
    document.getElementById('closeGlobalOverlayBtn').addEventListener('click', closeGlobalOverlay);
    detailDrawer.addEventListener('click', event => { if (event.target === detailDrawer) closeDetailDrawer(); });
    logDrawer.addEventListener('click', event => { if (event.target === logDrawer) closeLogDrawer(); });
    globalOverlayDrawer.addEventListener('click', event => { if (event.target === globalOverlayDrawer) closeGlobalOverlay(); });
    globalOverlayDrawerLevel3.addEventListener('click', event => { if (event.target === globalOverlayDrawerLevel3) closeGlobalOverlay(); });
    document.getElementById('closeGlobalOverlayBtnLevel3').addEventListener('click', closeGlobalOverlay);
    detailDrawerFrame.addEventListener('load', () => attachOverlayBridge(detailDrawerFrame));
    logDrawerFrame.addEventListener('load', () => attachOverlayBridge(logDrawerFrame));
    globalOverlayFrame.addEventListener('load', () => attachOverlayBridge(globalOverlayFrame));
    globalOverlayFrameLevel3.addEventListener('load', () => attachOverlayBridge(globalOverlayFrameLevel3));


    syncFiltersFromDom();
    render();
    setInterval(updateCountdowns, 1000);
  </script>
</body>
