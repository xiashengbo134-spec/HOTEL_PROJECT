<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>酒店订单列表页原型</title>
  <style>
    :root {
      --color-primary: #165dff;
      --color-primary-hover: #4080ff;
      --color-success: #00b42a;
      --color-warning: #ff7d00;
      --color-danger: #f53f3f;
      --color-text-1: #1d2129;
      --color-text-2: #4e5969;
      --color-text-3: #86909c;
      --color-text-4: #c9cdd4;
      --color-border-1: #e5e6eb;
      --color-border-2: #f2f3f5;
      --color-fill-1: #f7f8fa;
      --color-bg-1: #ffffff;
      --color-bg-2: #f2f3f5;
      --color-bg-blue: #edf3ff;
      --shadow-card: 0 8px 24px rgba(29, 33, 41, 0.06);
      --radius-small: 6px;
      --radius-large: 14px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--color-bg-2); font-family: "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--color-text-1); }
    button, input, select { font-family: inherit; }
    .layout { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { height: 56px; background: #fff; border-bottom: 1px solid var(--color-border-1); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 50; }
    .topbar-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .topbar-title { font-size: 16px; font-weight: 600; white-space: nowrap; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; color: var(--color-text-3); font-size: 14px; white-space: nowrap; }
    .avatar-chip { display: inline-flex; align-items: center; gap: 10px; padding: 6px 10px 6px 6px; border-radius: 999px; background: var(--color-fill-1); border: 1px solid var(--color-border-2); }
    .avatar-circle { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #165dff, #36cfc9); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
    .avatar-name { color: var(--color-text-2); font-size: 14px; font-weight: 500; }
    .main { min-height: calc(100vh - 56px); display: flex; }
    .sidebar { width: 232px; flex-shrink: 0; background: #fff; border-right: 1px solid var(--color-border-1); padding: 16px 12px; }
    .menu-group-title { padding: 8px 12px; color: var(--color-text-3); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .menu-tree, .menu-children { display: flex; flex-direction: column; gap: 4px; }
    .menu-children { padding-left: 12px; }
    .menu-item { display: flex; align-items: center; min-height: 40px; padding: 0 12px; border-radius: 10px; color: var(--color-text-2); font-size: 14px; font-weight: 500; }
    .menu-item.parent { justify-content: space-between; }
    .menu-item.active { background: var(--color-bg-blue); color: var(--color-primary); font-weight: 600; }
    .content { flex: 1; min-width: 0; padding: 20px; }
    .container { width: 100%; }
    .card { background: var(--color-bg-1); border: 1px solid var(--color-border-2); border-radius: var(--radius-large); box-shadow: var(--shadow-card); }
    .toolbar-card { padding: 16px; margin-bottom: 16px; }
    .toolbar-main { display: flex; align-items: stretch; gap: 16px; }
    .form-grid { flex: 1; display: grid; grid-template-columns: minmax(180px,1fr) minmax(180px,1fr) minmax(220px,1.15fr) minmax(220px,1.15fr); gap: 14px; align-items: end; }
    .field { min-width: 0; }
    .field-label { display: none; }
    .field-control, .range-control { width: 100%; min-height: 36px; border: 1px solid var(--color-border-1); border-radius: var(--radius-small); background: #fff; color: var(--color-text-1); padding: 0 12px; outline: none; }
    .field-control:focus, .range-control:focus, .date-select:focus, .inline-field:focus-within { border-color: var(--color-primary); box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.1); }
    .field-control::placeholder { color: var(--color-text-4); }
    .inline-field { display: flex; align-items: center; min-height: 36px; border: 1px solid var(--color-border-1); border-radius: var(--radius-small); background: #fff; padding: 0 10px; gap: 10px; }
    .field-prefix { flex: 0 0 auto; color: var(--color-text-3); font-size: 14px; white-space: nowrap; }
    .field-split { width: 1px; height: 16px; background: var(--color-border-1); flex-shrink: 0; }
    .inline-field .field-control,
    .inline-field .date-select { border: 0; min-height: 34px; padding: 0; background: transparent; box-shadow: none; }
    .inline-field .field-control:focus,
    .inline-field .date-select:focus { box-shadow: none; }
    .inline-field .field-control { flex: 1; min-width: 0; }
    .composite-control { display: flex; align-items: center; gap: 4px; min-width: 0; width: 100%; }
    .date-select { min-width: 98px; color: var(--color-text-2); outline: none; }
    .field-time .date-select { flex: 0 0 88px; min-width: 88px; font-size: 14px; }
    .field-time .field-split { margin: 0 1px; }
    .range-control { display: flex; align-items: center; gap: 8px; padding: 0; border: 0; min-height: auto; background: transparent; }
    .field-time .range-control { flex: 1; min-width: 0; }
    .range-control input { border: 0; outline: none; min-width: 0; width: 100%; flex: 1; color: var(--color-text-1); background: transparent; padding: 0; }
    .field-time .range-control input { flex: 1 1 96px; }
    .range-sep { color: var(--color-text-4); font-size: 12px; }
    .toolbar-actions { margin-top: 0; display: flex; flex: 0 0 100px; padding-left: 16px; border-left: 1px solid var(--color-border-1); }
    .field-time { margin-right: 0; }
    .field-city { width: 100%; max-width: none; margin-left: 0; justify-self: stretch; }
    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .filter-btn-group { width: 100%; flex-direction: column; align-items: stretch; justify-content: space-between; flex-wrap: nowrap; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; min-width: 88px; height: 36px; padding: 0 16px; border-radius: var(--radius-small); border: 1px solid var(--color-border-1); background: #fff; color: var(--color-text-2); font-size: 14px; cursor: pointer; }
    .btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .btn-primary { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); color: #fff; }
    .btn-outline-primary { color: var(--color-primary); border-color: rgba(22, 93, 255, 0.35); background: rgba(22, 93, 255, 0.04); }
    .btn-outline-danger { color: var(--color-danger); border-color: rgba(245, 63, 63, 0.35); background: rgba(245, 63, 63, 0.04); }
    .btn[disabled] { opacity: .5; cursor: not-allowed; }
    .tabs-card { margin-bottom: 16px; padding: 0 16px; }
    .tabs-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .tabs { display: flex; gap: 28px; overflow-x: auto; min-width: 0; flex: 1; }
    .tab { position: relative; display: inline-flex; align-items: center; gap: 8px; height: 56px; padding: 0; border: 0; background: transparent; color: var(--color-text-2); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .tab::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 3px; border-radius: 999px 999px 0 0; background: transparent; }
    .tab.active { color: var(--color-primary); font-weight: 600; }
    .tab.active::after { background: var(--color-primary); }
    .badge-dot { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 999px; background: var(--color-danger); color: #fff; font-size: 12px; font-weight: 600; }
    .list-card { padding: 12px; }
    .list-meta { display: flex; align-items: center; justify-content: space-between; padding: 0 16px 8px; color: var(--color-text-2); font-size: 14px; gap: 12px; }
    .list-count { font-weight: 500; }
    .list-sort { display: inline-flex; align-items: center; justify-content: flex-start; }
    .list-sort-select { width: 120px; min-width: 120px; height: 30px; padding: 0 20px 0 10px; border: 1px solid var(--color-border-1); border-radius: var(--radius-small); background: var(--color-fill-1); color: var(--color-text-2); font-size: 12px; text-align: center; text-align-last: center; outline: none; }
    .list-sort-select:focus { border-color: var(--color-primary); box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.1); }
    .summary-chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; background: var(--color-fill-1); color: var(--color-text-2); font-size: 12px; line-height: 1.25; }
    .order-item { border: 1px solid var(--color-border-1); border-radius: 12px; background: #fff; padding: 10px 16px; }
    .order-item + .order-item { margin-top: 12px; }
    .order-top { display: grid; grid-template-columns: minmax(420px,1.38fr) minmax(460px,1.82fr) minmax(210px,.82fr) minmax(220px,.86fr); gap: 12px; align-items: start; }
    .section-title { margin-bottom: 6px; color: var(--color-text-3); font-size: 12px; font-weight: 500; }
    .order-title-line { display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
    .source-line { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .channel-badge { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 10px; color: #fff; font-weight: 700; font-size: 12px; flex-shrink: 0; }
    .channel-feizhu { background: linear-gradient(135deg, #ff7d00, #ffb400); }
    .channel-douyin { background: linear-gradient(135deg, #111827, #4b5563); }
    .channel-meituan { background: linear-gradient(135deg, #ffb400, #ff7d00); }
    .channel-xiecheng { background: linear-gradient(135deg, #165dff, #36cfc9); }
    .order-main { min-width: 0; }
    .id-row { display: flex; flex-direction: column; gap: 4px; min-width: 0; margin-bottom: 6px; }
    .id-cell { display: flex; align-items: center; gap: 8px; min-width: 0; flex-wrap: nowrap; }
    .mono { font-family: "JetBrains Mono", Consolas, monospace; white-space: nowrap; font-size: 14px; }
    .copy-btn { border: 0; background: transparent; color: var(--color-text-3); cursor: pointer; padding: 0; }
    .copy-icon { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--color-border-1); border-radius: 4px; font-size: 10px; background: #fff; }
    .copy-btn:hover .copy-icon { border-color: rgba(22, 93, 255, 0.35); background: rgba(22, 93, 255, 0.06); }
    .hotel-line { display: flex; align-items: center; gap: 8px; min-width: 0; margin-bottom: 4px; flex-wrap: wrap; }
    .hotel-name { font-size: 15px; font-weight: 600; color: var(--color-text-1); display: inline-flex; align-items: center; gap: 6px; min-width: 0; }
    .id-info-icon { display: inline-flex; align-items: center; justify-content: center; min-width: 24px; height: 18px; padding: 0 4px; border-radius: 4px; border: 1px solid var(--color-border-1); color: var(--color-text-3); font-size: 10px; font-weight: 600; background: #fff; flex-shrink: 0; line-height: 1; }
    .text-ellipsis { display: inline-block; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom; }
    .sub-line { color: var(--color-text-2); font-size: 14px; line-height: 1.35; }
    .sub-line strong { color: var(--color-text-3); font-weight: 500; }
    .sub-line-value { color: var(--color-text-1); font-weight: 500; }
    .pair-line { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); column-gap: 40px; row-gap: 6px; align-items: start; }
    .pair-item { display: grid; grid-template-columns: 70px minmax(0, 1fr); align-items: start; min-width: 0; }
    .pair-item strong { width: auto; flex: initial; }
    .time-list, .action-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .time-stack, .status-stack, .amount-stack { display: flex; flex-direction: column; gap: 6px; }
    .time-item { display: flex; align-items: center; justify-content: flex-start; gap: 10px; min-height: 22px; }
    .metric, .status-item { display: grid; grid-template-columns: 72px minmax(0, 1fr); align-items: center; column-gap: 10px; row-gap: 6px; min-height: 24px; }
    .sale-mode-row { display: flex; align-items: center; justify-content: flex-start; gap: 10px; min-height: 24px; }
    .time-label, .status-name, .metric-label, .sale-mode-label { width: 72px; flex: 0 0 72px; color: var(--color-text-3); font-size: 12px; line-height: 24px; }
    .time-value { color: var(--color-text-1); font-size: 14px; line-height: 1.35; text-align: left; word-break: break-all; }

    .tag { display: inline-flex; align-items: center; min-height: 24px; padding: 0 10px; border-radius: 999px; border: 1px solid transparent; font-size: 12px; line-height: 22px; white-space: nowrap; }
    .tag-blue { background: rgba(22, 93, 255, 0.08); color: var(--color-primary); border-color: rgba(22, 93, 255, 0.18); }
    .tag-green { background: rgba(0, 180, 42, 0.08); color: var(--color-success); border-color: rgba(0, 180, 42, 0.18); }
    .tag-orange { background: rgba(255, 125, 0, 0.1); color: var(--color-warning); border-color: rgba(255, 125, 0, 0.2); }
    .tag-red { background: rgba(245, 63, 63, 0.08); color: var(--color-danger); border-color: rgba(245, 63, 63, 0.18); }
    .tag-purple { background: rgba(114, 46, 209, 0.08); color: #722ed1; border-color: rgba(114, 46, 209, 0.16); }
    .tag-gray { background: var(--color-fill-1); color: var(--color-text-2); border-color: var(--color-border-1); }
    .status-tags { display: inline-flex; flex-direction: column; align-items: flex-start; justify-content: center; gap: 6px; min-width: 0; max-width: 100%; }
    .status-tags-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; width: auto; max-width: 100%; }
    .status-tags-row .tag, .status-tags > .tag { width: auto; max-width: 100%; flex: 0 0 auto; }
        .metric { padding: 0; border-radius: 0; background: transparent; }
    .metric-value { font-size: 16px; font-weight: 700; color: var(--color-text-1); display: inline-flex; align-items: center; gap: 8px; line-height: 24px; text-align: left; }
    .metric-danger .metric-value { color: var(--color-danger); }
    .metric-warning .metric-value { color: var(--color-warning); }
    .sale-mode-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 42px; width: auto; max-width: max-content; height: 20px; padding: 0 8px; border-radius: 999px; font-size: 12px; font-weight: 600; background: rgba(22, 93, 255, 0.08); color: var(--color-primary); flex: 0 0 auto; }
    .timer-label { display: none; }
    .timer-value { font-family: "JetBrains Mono", Consolas, monospace; font-size: 22px; font-weight: 700; letter-spacing: .5px; line-height: 1.1; color: var(--color-text-1); }

        .timer-safe .timer-value { color: #00a870; }
        .timer-warning .timer-value { color: var(--color-warning); }
        .timer-danger .timer-value, .timer-timeout .timer-value { color: var(--color-danger); }
        .timer-result { color: var(--color-text-1); font-weight: 600; font-size: 14px; line-height: 1.35; }


    .order-bottom { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--color-border-1); display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; }
    .pagination { margin-top: 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 4px; color: var(--color-text-2); font-size: 14px; }
    .pagination-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .page-number { min-width: 32px; height: 32px; padding: 0 10px; }
    .page-number.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .empty-state { padding: 60px 20px; text-align: center; color: var(--color-text-3); }
    .empty-title { margin: 0 0 8px; font-size: 18px; color: var(--color-text-2); font-weight: 600; }
    .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-12px); min-width: 220px; max-width: 520px; padding: 12px 16px; border-radius: 10px; background: rgba(29, 33, 41, 0.92); color: #fff; font-size: 14px; opacity: 0; pointer-events: none; transition: all 0.2s ease; z-index: 1000; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .modal-mask { position: fixed; inset: 0; background: rgba(29, 33, 41, 0.45); display: none; align-items: center; justify-content: center; padding: 24px; z-index: 999; }
    .modal-mask.show { display: flex; }
    .modal { width: 100%; max-width: 420px; border-radius: 16px; background: #fff; box-shadow: 0 20px 48px rgba(29, 33, 41, 0.18); overflow: hidden; }
    .modal-head { padding: 18px 20px 8px; font-size: 18px; font-weight: 600; }
    .modal-body { padding: 8px 20px 20px; color: var(--color-text-2); line-height: 1.7; font-size: 14px; }
    .modal-foot { padding: 0 20px 20px; display: flex; justify-content: flex-end; gap: 12px; }
    [data-tooltip] { position: relative; cursor: help; }
    [data-tooltip]:hover::after { content: attr(data-tooltip); position: absolute; left: 0; top: calc(100% + 8px); min-width: 220px; max-width: 340px; padding: 10px 12px; border-radius: 10px; background: rgba(29, 33, 41, 0.96); color: #fff; white-space: pre-line; font-size: 12px; line-height: 1.6; z-index: 10; }
    @media (max-width: 1360px) { .form-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .composite-control { grid-template-columns: 108px minmax(0, 1fr); } .order-top { grid-template-columns: 1fr; } }
    @media (max-width: 760px) { .content { padding: 16px; } .form-grid { grid-template-columns: 1fr; } .toolbar-actions, .order-bottom, .tabs-toolbar, .main, .pagination { flex-direction: column; align-items: stretch; } .sidebar { width: 100%; border-right: 0; border-bottom: 1px solid var(--color-border-1); } .btn-group, .action-list, .tabs, .pagination-controls { width: 100%; } .btn-group .btn, .action-list .btn { flex: 1; } }
  </style>
</head>
<body>
  <div class="layout">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">采购 / 订单</div>
        <div class="breadcrumb"><span>订单管理</span><span>/</span><span>酒店订单</span></div>
      </div>
      <div class="avatar-chip"><span class="avatar-circle">LX</span><span class="avatar-name">林开新</span></div>
    </header>

    <div class="main">
      <aside class="sidebar">
        <div class="menu-group-title">二级 / 三级菜单</div>
        <div class="menu-tree">
          <div class="menu-item parent">订单管理 <span>▾</span></div>
          <div class="menu-children"><div class="menu-item active">酒店订单</div></div>
        </div>
      </aside>

      <main class="content">
        <div class="container">
          <section class="card toolbar-card">
            <div class="toolbar-main">
              <div class="form-grid">
              <div class="field inline-field"><span class="field-prefix">系统订单号</span><span class="field-split"></span><input class="field-control" id="filterOrderNo" placeholder="支持完整单号或尾 6 位" /></div>
              <div class="field inline-field"><span class="field-prefix">外部订单号</span><span class="field-split"></span><input class="field-control" id="filterOuterOrderNo" placeholder="支持完整单号或尾 6 位" /></div>
              <div class="field inline-field"><span class="field-prefix">入住人 / 联系人</span><span class="field-split"></span><input class="field-control" id="filterGuestKeyword" placeholder="支持入住人、联系人、手机号聚合搜索" /></div>
              <div class="field inline-field"><span class="field-prefix">酒店名称 / ID</span><span class="field-split"></span><input class="field-control" id="filterHotelKeyword" placeholder="支持酒店名称、聚合ID、平台ID、销售ID" /></div>
              <div class="field field-time inline-field"><div class="composite-control"><select class="date-select" id="filterTimeType"><option value="bookingTime">预订时间</option><option value="checkInDate">入住时间</option><option value="checkOutDate">离店时间</option></select><span class="field-split"></span><div class="range-control"><input id="filterStartDate" type="date" placeholder="开始日期" /><span class="range-sep">至</span><input id="filterEndDate" type="date" placeholder="结束日期" /></div></div></div>
              <div class="field field-city inline-field"><span class="field-prefix">城市</span><span class="field-split"></span><input class="field-control" id="filterCity" placeholder="请输入" /></div>
              <div class="field inline-field"><span class="field-prefix">订单来源</span><span class="field-split"></span><select class="field-control" id="filterSource"><option value="">全部来源</option><option value="飞猪·杭州直营店">飞猪 · 杭州直营店</option><option value="抖音·江浙运营号">抖音 · 江浙运营号</option><option value="美团·华东旗舰店">美团 · 华东旗舰店</option><option value="携程·商旅专营店">携程 · 商旅专营店</option></select></div>
              <div class="field inline-field"><span class="field-prefix">平台订单状态</span><span class="field-split"></span><select class="field-control" id="filterPlatformStatus"><option value="">全部状态</option><option value="待确认">待确认</option><option value="已接单">已接单</option><option value="取消中">取消中</option><option value="已取消">已取消</option></select></div>
              </div>
              <div class="toolbar-actions"><div class="btn-group filter-btn-group"><button class="btn btn-primary" id="searchBtn">查询</button><button class="btn" id="resetBtn">重置</button></div></div>
            </div>
          </section>

          <section class="card tabs-card">
            <div class="tabs-toolbar"><div class="tabs" id="tabs"></div><div class="btn-group"><button class="btn">导出</button><button class="btn">导出记录</button></div></div>
          </section>

          <section class="card list-card">
            <div class="list-meta"><div class="list-count" id="resultText">共 0 条订单</div><div class="list-sort" id="sortWrap" style="display:none;"><select class="list-sort-select" id="sortSelect"><option value="default">按默认排序</option><option value="slaAsc">按剩余处理时间排序</option></select></div></div>

    }

    function render() { renderTabs(); renderOrders(); }
    function syncFiltersFromDom() { state.filters.orderNo = document.getElementById('filterOrderNo').value.trim(); state.filters.outerOrderNo = document.getElementById('filterOuterOrderNo').value.trim(); state.filters.guestKeyword = document.getElementById('filterGuestKeyword').value.trim(); state.filters.hotelKeyword = document.getElementById('filterHotelKeyword').value.trim(); state.filters.timeType = document.getElementById('filterTimeType').value; state.filters.startDate = document.getElementById('filterStartDate').value; state.filters.endDate = document.getElementById('filterEndDate').value; state.filters.city = document.getElementById('filterCity').value; state.filters.source = document.getElementById('filterSource').value; state.filters.platformStatus = document.getElementById('filterPlatformStatus').value; state.pageNum = 1; }
    function resetFilters() { document.getElementById('filterOrderNo').value = ''; document.getElementById('filterOuterOrderNo').value = ''; document.getElementById('filterGuestKeyword').value = ''; document.getElementById('filterHotelKeyword').value = ''; document.getElementById('filterTimeType').value = 'bookingTime'; document.getElementById('filterStartDate').value = ''; document.getElementById('filterEndDate').value = ''; document.getElementById('filterCity').value = ''; document.getElementById('filterSource').value = ''; document.getElementById('filterPlatformStatus').value = ''; syncFiltersFromDom(); render(); showToast('筛选条件已重置'); }
    function showToast(message) { toastEl.textContent = message; toastEl.classList.add('show'); clearTimeout(showToast.timer); showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 1800); }
    function openConfirm(action, orderNo) { const actionText = action === 'accept' ? '接单' : '拒单'; state.confirmAction = { action, orderNo }; confirmTitle.textContent = `确认${actionText}`; confirmContent.textContent = `确认要对订单 ${orderNo} 执行“${actionText}”操作吗？`; confirmMask.classList.add('show'); }
    function closeConfirm() { confirmMask.classList.remove('show'); state.confirmAction = null; }
    function updateCountdowns() { document.querySelectorAll('.timer-value[data-deadline]').forEach(el => { const deadline = Number(el.dataset.deadline); const box = el.closest('.time-stack'); const level = getSlaLevel(deadline); el.textContent = formatCountdown(deadline); if (box) { box.classList.remove('timer-safe', 'timer-warning', 'timer-danger', 'timer-timeout'); box.classList.add(`timer-${level}`); } }); }

    tabsEl.addEventListener('click', event => { const tabBtn = event.target.closest('[data-tab]'); if (!tabBtn) return; state.activeTab = tabBtn.dataset.tab; state.pageNum = 1; if (state.activeTab !== 'pending') state.sortBy = 'default'; render(); });
    orderListEl.addEventListener('click', async event => { const copyBtn = event.target.closest('[data-copy]'); if (copyBtn) { try { await navigator.clipboard.writeText(copyBtn.dataset.copy); showToast(`已复制：${copyBtn.dataset.copy}`); } catch { showToast('复制失败，请手动复制'); } return; } const actionBtn = event.target.closest('[data-action]'); if (!actionBtn) return; const action = actionBtn.dataset.action; const orderNo = actionBtn.dataset.order; if (action === 'accept' || action === 'reject') return openConfirm(action, orderNo); if (action === 'detail') return showToast(`进入订单详情页：${orderNo}`); if (action === 'log') showToast(`打开订单日志：${orderNo}`); });
    paginationEl.addEventListener('click', event => { const pageBtn = event.target.closest('[data-page]'); const actionBtn = event.target.closest('[data-page-action]'); const totalPages = Math.max(1, Math.ceil(getFilteredOrders().length / state.pageSize)); if (pageBtn) { state.pageNum = Number(pageBtn.dataset.page); render(); return; } if (actionBtn) { const action = actionBtn.dataset.pageAction; if (action === 'prev' && state.pageNum > 1) state.pageNum -= 1; if (action === 'next' && state.pageNum < totalPages) state.pageNum += 1; render(); } });
    sortSelectEl.addEventListener('change', event => { state.sortBy = event.target.value; state.pageNum = 1; render(); });
    document.getElementById('searchBtn').addEventListener('click', () => { syncFiltersFromDom(); render(); showToast('已按当前筛选条件刷新列表'); });
    document.getElementById('resetBtn').addEventListener('click', resetFilters);
    submitConfirmBtn.addEventListener('click', () => { if (!state.confirmAction) return; showToast(`已确认${state.confirmAction.action === 'accept' ? '接单' : '拒单'}：${state.confirmAction.orderNo}`); closeConfirm(); });
    cancelConfirmBtn.addEventListener('click', closeConfirm);
    confirmMask.addEventListener('click', event => { if (event.target === confirmMask) closeConfirm(); });

    syncFiltersFromDom();
    render();
    setInterval(updateCountdowns, 1000);
  </script>
</body>
</html>
